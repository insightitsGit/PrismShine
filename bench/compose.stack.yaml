# Stack suite local topology. Build context for insight-stack is the repository root.
services:
  insight-stack:
    build: { context: .., dockerfile: shims/insight-stack/Dockerfile }
    ports: ["8101:8000"]
    cpus: 2
    mem_limit: 4g

  oss-llmguard:
    build: { context: shims/oss-llmguard }
    ports: ["8102:8000"]
    cpus: 2
    mem_limit: 4g

  oss-langgraph-hhem:
    build: { context: shims/oss-langgraph-hhem }
    ports: ["8103:8000"]
    cpus: 2
    mem_limit: 6g
