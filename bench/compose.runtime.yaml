# Runtime suite: ChorusGraph+PrismShine vs 3 LangGraph-shaped competitors.
# Run from repo root:
#   docker compose -f bench/compose.runtime.yaml --project-directory . up --build -d
services:
  chorus-shine:
    build:
      context: .
      dockerfile: bench/shims/chorus-shine/Dockerfile
    ports: ["8201:8000"]
    cpus: 2
    mem_limit: 4g

  oss-langgraph-hhem:
    build:
      context: bench/shims/oss-langgraph-hhem
    ports: ["8202:8000"]
    cpus: 2
    mem_limit: 6g

  oss-langgraph-minilm:
    build:
      context: bench/shims/oss-langgraph-minilm
    ports: ["8203:8000"]
    cpus: 2
    mem_limit: 4g

  oss-langgraph-lettuce:
    build:
      context: bench/shims/oss-langgraph-lettuce
    ports: ["8204:8000"]
    cpus: 2
    mem_limit: 6g
